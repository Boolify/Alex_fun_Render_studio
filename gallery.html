<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="top-header">
    <div class="header-inner">

      <div class="brand-left">
        <div class="logo-dot"></div>
        <div class="logo-text">-логотип</div>
      </div>

      <div class="brand-center">
        AlexFUN’s Render Studio
      </div>

      <div></div>

    </div>
  </header>

  <nav class="nav-row">
    <div class="nav-inner">

      <div class="nav-links">
        <a class="pill" href="index.html">Портфолио</a>
        <a class="pill active" href="gallery.html">Галерея</a>
        <a class="pill" href="blog.html">Блог/Гайды</a>
        <a class="pill" href="contacts.html">Контакты</a>
      </div>

      <div class="social-top">
        <div class="social-label">Соцсети</div>
        <div class="social-icons">
          <div class="social-icon"></div>
          <div class="social-icon"></div>
          <div class="social-icon"></div>
        </div>
      </div>

    </div>
  </nav>

  <main class="content">

    <h1 class="center">Галерея</h1>

    <div class="slider">
      <button class="arrow left" onclick="prevSlide()"></button>

      <img id="slideImg" src="img/1.jpg" class="slide-img">

      <button class="arrow right" onclick="nextSlide()"></button>
    </div>

    <h2 class="center">Примеры работ</h2>

    <div class="gallery-item">
      <p>Динамичный рендер</p>
      <img src="img/6.jpg" class="img">
    </div>

    <div class="gallery-item">
      <p>Кинематографичный постер</p>
      <img src="img/7.jpg" class="img">
    </div>

    <div class="gallery-item">
      <p>Стилизованный портрет</p>
      <img src="img/8.jpg" class="img">
    </div>

  </main>

  <footer class="footer">
    <div class="footer-inner">

      <div class="footer-left">
        <div class="footer-brand">AlexFUN’s Render Studio</div>
        <div class="copyright">© AlexFUN’s Render Studio. All rights reserved</div>
      </div>

      <div class="footer-right">
        <div class="footer-slogan">Превращаем ваш геймплей в искусство</div>
        <div class="footer-social">
          Соцсети:
          <div class="social-icon dark"></div>
          <div class="social-icon dark"></div>
          <div class="social-icon dark"></div>
        </div>
      </div>

    </div>
  </footer>

</div>

<script>
const slides = [
  "img/1.jpg",
  "img/2.jpg",
  "img/3.jpg",
  "img/4.jpg",
  "img/5.jpg"
];

let index = 0;
const img = document.getElementById("slideImg");

function show() {
  img.src = slides[index];
}

function nextSlide() {
  index = (index + 1) % slides.length;
  show();
}

function prevSlide() {
  index = (index - 1 + slides.length) % slides.length;
  show();
}
</script>

</body>
</html>
