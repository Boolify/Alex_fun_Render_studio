<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="top-header">
    <div class="header-inner">
      <div class="brand-left">
        <img class="logo" src="img/logo.jpeg" alt="logo">
        <div class="logo-text">AlexFUN</div>
      </div>
      <div class="brand-center">AlexFUN’s Render Studio</div>
      <div></div>
    </div>
  </header>

  <nav class="nav-row">
    <div class="nav-inner">

      <div class="nav-links">
        <a class="pill" href="index.html">Портфолио</a>
        <a class="pill active" href="gallery.html">Галерея</a>
        <a class="pill" href="blog.html">Блог/Гайды</a>
        <a class="pill" href="contacts.html">Контакты</a>
      </div>

    </div>
  </nav>

  <main class="content">

    <h1 class="center">Галерея</h1>

    <div class="slider">
      <img id="slide" src="img/slide1.jpg">
    </div>

    <h2>Примеры работ</h2>

    <div class="gallery-grid">
      <img src="img/work1.jpg">
      <img src="img/work2.jpg">
      <img src="img/work3.jpg">
    </div>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>© AlexFUN</div>
      <div>Render Studio</div>
    </div>
  </footer>

</div>

<script>
let images = ["img/slide1.jpg","img/slide2.jpg","img/slide3.jpg","img/slide4.jpg","img/slide5.jpg"];
let i = 0;

setInterval(()=>{
  i = (i+1)%images.length;
  document.getElementById("slide").src = images[i];
},3000);
</script>

</body>
</html>
