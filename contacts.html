<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <header class="top-header">
    <div class="header-inner">
      <div class="brand-left">
        <div class="logo-dot"></div>
        <div class="logo-text">-логотип</div>
      </div>

      <div class="brand-center">
        AlexFUN’s Render Studio
      </div>

      <div class="brand-right"></div>
    </div>
  </header>

  <nav class="nav-row">
    <div class="nav-inner">

      <div class="nav-links">
        <a class="pill" href="index.html">Портфолио</a>
        <a class="pill" href="gallery.html">Галерея</a>
        <a class="pill" href="blog.html">Блог/Гайды</a>
        <a class="pill active" href="contacts.html">Контакты</a>
      </div>

      <div class="social-top">
        <div class="social-label">Соцсети</div>
        <div class="social-icons">
          <div class="social-icon"></div>
          <div class="social-icon"></div>
          <div class="social-icon"></div>
        </div>
      </div>

    </div>
  </nav>

  <main class="content">

    <h1 class="center">Контакты</h1>

    <p class="lead center">
      Свяжитесь с нами любым удобным способом
    </p>

    <section class="contact-block">

      <div class="info-item">
        <div class="info-title">
          <span class="icon">📍</span>
          <span>Местонахождение</span>
        </div>
        <div class="info-value">Москва</div>
      </div>

      <div class="info-item">
        <div class="info-title">
          <span class="icon">✉</span>
          <span>Почта</span>
        </div>
        <div class="info-value">example@mail.com</div>
      </div>

      <form class="form-card">
        <input type="text" placeholder="Ваше имя">
        <input type="email" placeholder="Почта">
        <textarea placeholder="Сообщение"></textarea>
        <button type="submit">Отправить</button>
      </form>

    </section>

  </main>

  <footer class="footer">
    <div>
      <div class="footer-brand">AlexFUN’s Render Studio</div>
      <div class="copyright">
        © AlexFUN’s Render Studio. All rights reserved
      </div>
    </div>

    <div>
      <div class="footer-slogan">
        Превращаем ваш геймплей в искусство
      </div>
      <div class="footer-social">
        Соцсети:
        <div class="social-icon dark"></div>
        <div class="social-icon dark"></div>
        <div class="social-icon dark"></div>
      </div>
    </div>
  </footer>

</div>

</body>
</html>
